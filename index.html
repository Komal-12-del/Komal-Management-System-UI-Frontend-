<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div style="height:100vh;display:flex;justify-content:center;align-items:center;background:#f2f2f2;">

<div style="display:flex;background:white;padding:30px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.2);">

<div style="width:300px;background:#fafafa;padding:20px;border-radius:10px;margin-right:25px;">
<h2 style="text-align:center;">Signup</h2>

<input style="width:100%;padding:10px;margin:8px 0;" type="text" placeholder="Name">
<input style="width:100%;padding:10px;margin:8px 0;" type="email" placeholder="Email">
<input style="width:100%;padding:10px;margin:8px 0;" type="password" placeholder="Password">
<input style="width:100%;padding:10px;margin:8px 0;" type="date">

<button style="width:100%;padding:12px;background:#007bff;color:white;border:none;"></button>
</div>

<img style="width:250px;height:250px;border-radius:10px;object-fit:cover;"
src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">

</div>

</div>

</body>
</html>
